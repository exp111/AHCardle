<span class="value"
      [class.lower]="isNumber() && correctCard() && answerIsLower(card().cost, correctCard()?.cost)"
      [class.higher]="isNumber() && correctCard() && answerIsHigher(card().cost, correctCard()?.cost)"
      [class.correct]="correctCard() && card()[field()] == correctCard()?.[field()]">{{ displayValue() }}</span>
<span class="text-muted"> {{name()}}</span>
